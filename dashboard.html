<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overmind Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5e6d0;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  #game-wrapper {
    position: relative;
    border: 3px solid #8b7355;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  canvas { display: block; image-rendering: pixelated; }
  #status-bar {
    width: 900px;
    background: #3a3a4a;
    color: #e8e8e8;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 3px solid #8b7355;
    border-top: none;
    border-radius: 0 0 8px 8px;
    flex-wrap: wrap;
    gap: 4px;
  }
  #status-bar .agents { display: flex; gap: 12px; flex-wrap: wrap; }
  #status-bar .agent-status { display: flex; align-items: center; gap: 4px; }
  #status-bar .totals { color: #aaddaa; }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="canvas" width="900" height="500"></canvas>
</div>
<div id="status-bar">
  <div class="agents" id="agent-statuses"></div>
  <div class="totals" id="totals"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;
const TILE = 20;

// ─── Colors ───
const FLOOR_A = '#e8d5b0';
const FLOOR_B = '#e0ccaa';
const WALL_COLOR = '#9a8a6a';
const WALL_TOP = '#b5a48a';
const DESK_COLOR = '#8b6b42';
const DESK_DARK = '#6b5030';
const MONITOR_ON = '#7bcce0';
const MONITOR_OFF = '#5a5a6a';
const CHAIR_COLOR = '#4a4a5a';
const PLANT_STEM = '#5a8a3a';
const PLANT_LEAF = '#6abf4a';
const PLANT_POT = '#9a6a40';
const COFFEE_BODY = '#6a6a7a';
const COFFEE_TOP = '#8a8a9a';
const WHITEBOARD_BG = '#f0f0f0';
const WHITEBOARD_FRAME = '#8a8a9a';

// ─── Agent definitions ───
const agents = [
  { id: 'router',    name: '라우터',    shirtColor: '#4a90d9', skinColor: '#f5d0a0', deskRow: 0, deskCol: 0, status: 'working', task: '요청 분배 중', taskTimer: 0 },
  { id: 'pipecore',  name: '파이프코어', shirtColor: '#e88a3a', skinColor: '#f5d0a0', deskRow: 0, deskCol: 1, status: 'working', task: '파이프라인 실행', taskTimer: 0 },
  { id: 'thesis',    name: '테시스엔진', shirtColor: '#4ab870', skinColor: '#dfc090', deskRow: 0, deskCol: 2, status: 'idle',    task: '', taskTimer: 0 },
  { id: 'portfolio', name: '포트폴리오', shirtColor: '#9a6ad9', skinColor: '#f5d0a0', deskRow: 1, deskCol: 0, status: 'working', task: '포트폴리오 분석', taskTimer: 0 },
  { id: 'datasrc',   name: '데이터소스', shirtColor: '#4ac8c8', skinColor: '#dfc090', deskRow: 1, deskCol: 1, status: 'idle',    task: '', taskTimer: 0 },
  { id: 'report',    name: '리포트출력', shirtColor: '#d9c840', skinColor: '#f5d0a0', deskRow: 2, deskCol: 0, status: 'working', task: '일일 리포트 생성', taskTimer: 0 },
  { id: 'addon',     name: '에드온',    shirtColor: '#d94a4a', skinColor: '#dfc090', deskRow: 2, deskCol: 1, status: 'idle',    task: '', taskTimer: 0 },
];

// Desk positions (pixel coords for each desk)
const deskPositions = [];
for (let r = 0; r < 3; r++) {
  for (let c = 0; c < 3; c++) {
    deskPositions.push({
      x: 100 + c * 200,
      y: 140 + r * 120,
    });
  }
}

// Coffee machine position
const coffeePos = { x: 700, y: 320 };

// Plant positions
const plantPositions = [
  { x: 660, y: 200 },
  { x: 660, y: 340 },
  { x: 820, y: 160 },
  { x: 60, y: 420 },
];

// ─── Agent state ───
agents.forEach((a) => {
  const dp = deskPositions[a.deskRow * 3 + a.deskCol];
  // Character sits below the desk
  a.deskX = dp.x;
  a.deskY = dp.y;
  a.x = dp.x + 20;
  a.y = dp.y + 28;
  a.targetX = a.x;
  a.targetY = a.y;
  a.animFrame = 0;
  a.animTimer = 0;
  a.walkPhase = 0;
  a.walkTimer = 0;
  a.idleWaitTimer = Math.random() * 300 + 100;
  a.wanderState = 'sitting'; // sitting, walking_to_coffee, at_coffee, walking_back
  a.facingLeft = false;
});

// ─── Simulated events ───
const tasks = [
  '요청 분배 중', '파이프라인 실행', '테시스 생성', '포트폴리오 분석',
  '데이터 수집', '리포트 생성', 'API 호출 처리', '뉴스 분석',
  '종목 스크리닝', '섹터 분석', '실적 파싱', 'RSS 수집',
  '알림 전송', '차트 생성', '요약 작성',
];

let processedCount = Math.floor(Math.random() * 50) + 100;
let pendingCount = Math.floor(Math.random() * 8);

function randomTask() {
  return tasks[Math.floor(Math.random() * tasks.length)];
}

// ─── Drawing functions ───

function drawFloor() {
  for (let y = 0; y < H; y += TILE) {
    for (let x = 0; x < W; x += TILE) {
      const isAlt = ((x / TILE) + (y / TILE)) % 2 === 0;
      ctx.fillStyle = isAlt ? FLOOR_A : FLOOR_B;
      ctx.fillRect(x, y, TILE, TILE);
    }
  }
}

function drawWalls() {
  // Top wall
  ctx.fillStyle = WALL_COLOR;
  ctx.fillRect(0, 0, W, 50);
  ctx.fillStyle = WALL_TOP;
  ctx.fillRect(0, 0, W, 10);

  // Wall trim
  ctx.fillStyle = '#7a6a50';
  ctx.fillRect(0, 48, W, 4);

  // Baseboard shadow
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 52, W, 4);
}

function drawWhiteboard() {
  const x = 460, y = 10;
  // Frame
  ctx.fillStyle = WHITEBOARD_FRAME;
  ctx.fillRect(x - 2, y - 2, 124, 38);
  // Board
  ctx.fillStyle = WHITEBOARD_BG;
  ctx.fillRect(x, y, 120, 34);
  // Some "writing" lines
  ctx.fillStyle = '#c0c0c8';
  ctx.fillRect(x + 8, y + 8, 40, 2);
  ctx.fillRect(x + 8, y + 14, 55, 2);
  ctx.fillRect(x + 8, y + 20, 35, 2);
  // Red dot
  ctx.fillStyle = '#e06060';
  ctx.fillRect(x + 70, y + 8, 4, 4);
  // Green dot
  ctx.fillStyle = '#60c060';
  ctx.fillRect(x + 80, y + 8, 4, 4);
}

function drawDesk(x, y, hasAgent) {
  // Desk shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(x - 1, y + 17, 62, 6);

  // Desk top
  ctx.fillStyle = DESK_COLOR;
  ctx.fillRect(x, y, 60, 18);
  // Desk front edge
  ctx.fillStyle = DESK_DARK;
  ctx.fillRect(x, y + 16, 60, 4);

  // Monitor on desk
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x + 20, y + 2, 20, 12);
  ctx.fillStyle = hasAgent ? MONITOR_ON : MONITOR_OFF;
  ctx.fillRect(x + 22, y + 3, 16, 9);
  // Monitor stand
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x + 28, y + 14, 4, 3);

  // Keyboard
  if (hasAgent) {
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(x + 18, y + 20, 24, 4);
  }
}

function drawChair(x, y) {
  ctx.fillStyle = CHAIR_COLOR;
  // Seat
  ctx.fillRect(x + 24, y + 30, 12, 10);
  // Back
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x + 25, y + 38, 10, 4);
}

function drawPlant(x, y) {
  // Pot
  ctx.fillStyle = PLANT_POT;
  ctx.fillRect(x, y + 8, 12, 8);
  ctx.fillRect(x - 1, y + 7, 14, 3);
  // Stem
  ctx.fillStyle = PLANT_STEM;
  ctx.fillRect(x + 5, y + 2, 2, 8);
  // Leaves
  ctx.fillStyle = PLANT_LEAF;
  ctx.fillRect(x + 1, y, 4, 4);
  ctx.fillRect(x + 7, y - 1, 4, 4);
  ctx.fillRect(x + 3, y - 3, 5, 4);
  // Leaf highlight
  ctx.fillStyle = '#80d060';
  ctx.fillRect(x + 4, y - 2, 2, 2);
}

function drawCoffeeMachine(x, y) {
  // Body
  ctx.fillStyle = COFFEE_BODY;
  ctx.fillRect(x, y, 20, 24);
  ctx.fillStyle = COFFEE_TOP;
  ctx.fillRect(x, y, 20, 4);
  // Nozzle
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(x + 7, y + 8, 6, 4);
  // Cup area
  ctx.fillStyle = '#8a6a40';
  ctx.fillRect(x + 6, y + 16, 8, 6);
  // Light
  ctx.fillStyle = '#60d060';
  ctx.fillRect(x + 16, y + 6, 2, 2);
  // Label "COFFEE"
  ctx.fillStyle = '#aaa';
  ctx.font = '3px "Press Start 2P"';
  ctx.fillText('☕', x + 4, y + 30);
}

// ─── Pixel character drawing ───

function drawCharacter(agent, time) {
  const x = Math.round(agent.x);
  const y = Math.round(agent.y);
  const isWorking = agent.status === 'working' && agent.wanderState === 'sitting';
  const isWalking = agent.wanderState === 'walking_to_coffee' || agent.wanderState === 'walking_back';

  const frame = agent.animFrame;
  const fl = agent.facingLeft;

  // Shadow under character
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(x - 3, y + 9, 10, 3);

  // ─ Body (shirt) ─
  ctx.fillStyle = agent.shirtColor;
  ctx.fillRect(x - 2, y, 8, 6);

  // ─ Head ─
  ctx.fillStyle = agent.skinColor;
  ctx.fillRect(x - 1, y - 5, 6, 5);
  // Hair
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x - 1, y - 6, 6, 2);
  if (!fl) {
    ctx.fillRect(x - 1, y - 5, 1, 3);
  } else {
    ctx.fillRect(x + 4, y - 5, 1, 3);
  }
  // Eye
  ctx.fillStyle = '#2a2a2a';
  if (!fl) {
    ctx.fillRect(x + 2, y - 3, 1, 1);
  } else {
    ctx.fillRect(x + 1, y - 3, 1, 1);
  }

  // ─ Arms ─
  ctx.fillStyle = agent.skinColor;
  if (isWorking) {
    // Typing animation - arms move
    if (frame === 0) {
      ctx.fillRect(x - 3, y + 1, 2, 3);
      ctx.fillRect(x + 5, y + 2, 2, 3);
    } else {
      ctx.fillRect(x - 3, y + 2, 2, 3);
      ctx.fillRect(x + 5, y + 1, 2, 3);
    }
  } else if (isWalking) {
    // Swinging arms
    if (frame === 0) {
      ctx.fillRect(x - 3, y + 1, 2, 3);
      ctx.fillRect(x + 5, y + 2, 2, 3);
    } else {
      ctx.fillRect(x - 3, y + 2, 2, 3);
      ctx.fillRect(x + 5, y + 1, 2, 3);
    }
  } else {
    // Idle standing arms
    ctx.fillRect(x - 3, y + 1, 2, 4);
    ctx.fillRect(x + 5, y + 1, 2, 4);
  }

  // ─ Legs ─
  ctx.fillStyle = '#4a5a7a';
  if (isWalking) {
    if (frame === 0) {
      ctx.fillRect(x, y + 6, 2, 4);
      ctx.fillRect(x + 3, y + 7, 2, 3);
    } else {
      ctx.fillRect(x, y + 7, 2, 3);
      ctx.fillRect(x + 3, y + 6, 2, 4);
    }
  } else {
    // Standing / sitting legs
    ctx.fillRect(x, y + 6, 2, 3);
    ctx.fillRect(x + 3, y + 6, 2, 3);
  }

  // Shoes
  ctx.fillStyle = '#3a3030';
  if (isWalking) {
    if (frame === 0) {
      ctx.fillRect(x - 1, y + 10, 3, 1);
      ctx.fillRect(x + 3, y + 10, 3, 1);
    } else {
      ctx.fillRect(x - 1, y + 10, 3, 1);
      ctx.fillRect(x + 2, y + 10, 3, 1);
    }
  } else {
    ctx.fillRect(x - 1, y + 9, 3, 1);
    ctx.fillRect(x + 2, y + 9, 3, 1);
  }
}

function drawNameTag(agent) {
  const x = Math.round(agent.x);
  const y = Math.round(agent.y);

  ctx.font = '6px "Press Start 2P"';
  const nameW = ctx.measureText(agent.name).width;
  const tagX = x + 2 - nameW / 2;
  const tagY = y - 14;

  // Tag background
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(tagX - 3, tagY - 7, nameW + 6, 10);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(tagX - 3, tagY - 7, nameW + 6, 10);

  // Name text
  ctx.fillStyle = '#3a3a3a';
  ctx.fillText(agent.name, tagX, tagY);
}

function drawSpeechBubble(agent) {
  if (agent.status !== 'working' || !agent.task) return;
  if (agent.wanderState !== 'sitting') return;

  const x = Math.round(agent.x);
  const y = Math.round(agent.y);

  ctx.font = '5px "Press Start 2P"';
  const text = agent.task;
  const tw = ctx.measureText(text).width;
  const bx = x + 2 - tw / 2;
  const by = y - 28;

  // Bubble
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, bx - 5, by - 8, tw + 10, 12, 3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.5;
  roundRect(ctx, bx - 5, by - 8, tw + 10, 12, 3);
  ctx.stroke();

  // Tail
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(x, by + 4);
  ctx.lineTo(x + 4, by + 4);
  ctx.lineTo(x + 2, by + 8);
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#4a4a4a';
  ctx.fillText(text, bx, by);
}

function drawIdleIndicator(agent, time) {
  if (agent.status !== 'idle') return;
  if (agent.wanderState !== 'sitting') return;

  const x = Math.round(agent.x);
  const y = Math.round(agent.y);
  const bob = Math.sin(time * 0.002) * 1.5;

  ctx.font = '7px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillText('💤', x - 1, y - 18 + bob);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── Wall decorations ───
function drawWallDecorations() {
  // Clock
  const cx = 200, cy = 25;
  ctx.fillStyle = '#f0f0e8';
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5a5a5a';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Clock hands
  const now = new Date();
  const hr = now.getHours() % 12;
  const mn = now.getMinutes();
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  const ha = (hr + mn / 60) * (Math.PI * 2 / 12) - Math.PI / 2;
  ctx.lineTo(cx + Math.cos(ha) * 5, cy + Math.sin(ha) * 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  const ma = mn * (Math.PI * 2 / 60) - Math.PI / 2;
  ctx.lineTo(cx + Math.cos(ma) * 7, cy + Math.sin(ma) * 7);
  ctx.stroke();

  // Poster / picture frame
  ctx.fillStyle = '#8a7a60';
  ctx.fillRect(740, 12, 34, 28);
  ctx.fillStyle = '#c8e0f0';
  ctx.fillRect(742, 14, 30, 24);
  // Simple mountain scene
  ctx.fillStyle = '#90c0a0';
  ctx.fillRect(742, 28, 30, 10);
  ctx.fillStyle = '#7aaa8a';
  ctx.beginPath();
  ctx.moveTo(750, 28);
  ctx.lineTo(757, 18);
  ctx.lineTo(764, 28);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#6a9a7a';
  ctx.beginPath();
  ctx.moveTo(758, 28);
  ctx.lineTo(767, 20);
  ctx.lineTo(772, 28);
  ctx.closePath();
  ctx.fill();
}

// ─── Rug ───
function drawRug() {
  ctx.fillStyle = 'rgba(180,140,100,0.15)';
  roundRect(ctx, 75, 115, 520, 350, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(160,120,80,0.2)';
  ctx.lineWidth = 2;
  roundRect(ctx, 75, 115, 520, 350, 6);
  ctx.stroke();
}

// ─── Update agent logic ───
function updateAgents(dt) {
  agents.forEach((a) => {
    // Animation timer
    a.animTimer += dt;
    if (a.animTimer > 400) {
      a.animTimer = 0;
      a.animFrame = 1 - a.animFrame;
    }

    // Task timer - randomly change status
    a.taskTimer += dt;
    if (a.taskTimer > 5000 + Math.random() * 10000) {
      a.taskTimer = 0;
      if (a.status === 'working') {
        // Chance to go idle
        if (Math.random() < 0.35) {
          a.status = 'idle';
          a.task = '';
          a.idleWaitTimer = 100 + Math.random() * 200;
          processedCount++;
        } else {
          a.task = randomTask();
        }
      } else {
        // Chance to start working
        if (Math.random() < 0.5) {
          a.status = 'working';
          a.task = randomTask();
          a.wanderState = 'sitting';
          const dp = deskPositions[a.deskRow * 3 + a.deskCol];
          a.targetX = dp.x + 20;
          a.targetY = dp.y + 28;
          pendingCount = Math.max(0, pendingCount + Math.floor(Math.random() * 3) - 1);
        }
      }
    }

    // Idle wandering behavior
    if (a.status === 'idle') {
      if (a.wanderState === 'sitting') {
        a.idleWaitTimer -= dt / 16;
        if (a.idleWaitTimer <= 0) {
          // Walk to coffee machine
          a.wanderState = 'walking_to_coffee';
          a.targetX = coffeePos.x - 10 + Math.random() * 20;
          a.targetY = coffeePos.y + 30 + Math.random() * 10;
        }
      } else if (a.wanderState === 'at_coffee') {
        a.idleWaitTimer -= dt / 16;
        if (a.idleWaitTimer <= 0) {
          a.wanderState = 'walking_back';
          const dp = deskPositions[a.deskRow * 3 + a.deskCol];
          a.targetX = dp.x + 20;
          a.targetY = dp.y + 28;
        }
      }
    }

    // When working, ensure going back to desk
    if (a.status === 'working' && a.wanderState !== 'sitting') {
      a.wanderState = 'walking_back';
      const dp = deskPositions[a.deskRow * 3 + a.deskCol];
      a.targetX = dp.x + 20;
      a.targetY = dp.y + 28;
    }

    // Smooth movement
    const dx = a.targetX - a.x;
    const dy = a.targetY - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 1) {
      const speed = 0.6;
      a.x += (dx / dist) * speed * (dt / 16);
      a.y += (dy / dist) * speed * (dt / 16);
      a.facingLeft = dx < 0;

      // Walk animation
      a.walkTimer += dt;
      if (a.walkTimer > 200) {
        a.walkTimer = 0;
        a.walkPhase = 1 - a.walkPhase;
      }
    } else {
      // Arrived
      a.x = a.targetX;
      a.y = a.targetY;

      if (a.wanderState === 'walking_to_coffee') {
        a.wanderState = 'at_coffee';
        a.idleWaitTimer = 80 + Math.random() * 120;
      } else if (a.wanderState === 'walking_back') {
        a.wanderState = 'sitting';
        a.idleWaitTimer = 100 + Math.random() * 300;
      }
    }
  });
}

// ─── Update status bar ───
function updateStatusBar() {
  const container = document.getElementById('agent-statuses');
  container.innerHTML = agents.map(a => {
    const dot = a.status === 'working' ? '🟢' : a.status === 'error' ? '🔴' : '⚪';
    return `<span class="agent-status">${dot} ${a.name}</span>`;
  }).join('');

  document.getElementById('totals').textContent =
    `처리: ${processedCount}건 | 대기: ${pendingCount}건`;
}

// ─── Main render ───
let lastTime = 0;
let statusUpdateTimer = 0;

function render(time) {
  const dt = lastTime ? time - lastTime : 16;
  lastTime = time;

  // Update
  updateAgents(dt);

  statusUpdateTimer += dt;
  if (statusUpdateTimer > 1000) {
    statusUpdateTimer = 0;
    updateStatusBar();
  }

  // Draw
  ctx.clearRect(0, 0, W, H);

  drawFloor();
  drawRug();
  drawWalls();
  drawWhiteboard();
  drawWallDecorations();

  // Draw plants
  plantPositions.forEach(p => drawPlant(p.x, p.y));

  // Draw coffee machine
  drawCoffeeMachine(coffeePos.x, coffeePos.y);

  // Draw desks, chairs, characters sorted by Y for depth
  // First pass: desks and chairs
  const activeDesks = new Set(agents.map(a => a.deskRow * 3 + a.deskCol));
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const idx = r * 3 + c;
      if (idx >= 7) continue; // Only 7 desks
      const dp = deskPositions[idx];
      drawChair(dp.x, dp.y);
      drawDesk(dp.x, dp.y, activeDesks.has(idx));
    }
  }

  // Sort agents by Y for depth sorting
  const sortedAgents = [...agents].sort((a, b) => a.y - b.y);

  sortedAgents.forEach(a => {
    drawCharacter(a, time);
    drawNameTag(a);
    drawSpeechBubble(a);
    drawIdleIndicator(a, time);
  });

  requestAnimationFrame(render);
}

updateStatusBar();
requestAnimationFrame(render);
</script>
</body>
</html>
